<lynx-section title='Data Table' not-collapsable>
    <lynx-table value='[rdfs:member]'>
        <lynx-plain-property heading='Title' value='[dcterms:title]'></lynx-plain-property>
        <lynx-plain-property heading='ID' value='[dcterms:identifier]'></lynx-plain-property>
        <lynx-date-property heading='Created' value='[dcterms:created]' format='YYYY-MM-DD'></lynx-date-property>
    </lynx-table>
</lynx-section>
